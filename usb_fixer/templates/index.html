<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>USB Fixer 2.0</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>USB Fixer 2.0</h1>
      <p>Сканирование флешек, внешних дисков и подозрительных файлов</p>
      <div class="actions">
        <button class="btn primary" onclick="scanTargets()">Сканировать</button>
      </div>
    </div>

    <div id="status" class="status">Готов к работе</div>
    <div id="results" class="grid"></div>
  </div>

  <script>
    async function scanTargets() {
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.textContent = "Идёт сканирование...";
      results.innerHTML = "";

      const res = await fetch("/scan");
      const data = await res.json();

      status.textContent = "Сканирование завершено";

      if (!data.targets || data.targets.length === 0) {
        results.innerHTML = `<div class="card"><h3>Ничего не найдено</h3><p>Диски или флешки не обнаружены.</p></div>`;
        return;
      }

      results.innerHTML = data.targets.map(t => {
        const susCount = t.suspicious.length;
        const hiddenCount = t.hidden_candidates.length;

        return `
          <div class="card">
            <div class="topline">
              <h3>${t.target}</h3>
              <span class="badge ${susCount ? 'danger' : 'ok'}">
                ${susCount ? `Угроз: ${susCount}` : 'Чисто'}
              </span>
            </div>

            <p>Скрытых кандидатов: ${hiddenCount}</p>

            ${susCount ? `
              <div class="list">
                ${t.suspicious.map(s => `<div class="item"><b>${s.reason}</b><br><span>${s.path}</span></div>`).join("")}
              </div>
              <button class="btn warn" onclick="fixTarget('${t.target.replace(/\\/g, "\\\\")}')">Исправить</button>
            ` : `
              <p>Подозрительных объектов не найдено.</p>
            `}
          </div>
        `;
      }).join("");
    }

    async function fixTarget(target) {
      const status = document.getElementById("status");
      status.textContent = `Исправление ${target}...`;

      const res = await fetch("/fix", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({target})
      });

      const data = await res.json();

      if (data.ok) {
        status.textContent = `Исправление завершено: ${target}`;
      } else {
        status.textContent = `Ошибка: ${data.error}`;
      }

      await scanTargets();
    }
  </script>
</body>
</html>
